<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Aditya ❤️ Kashish | Eternal Love Calculator</title>
  <!-- Tailwind + Font Awesome + Google Fonts -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,500;14..32,700&display=swap" rel="stylesheet">
  <style>
    * {
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    body {
      font-family: 'Inter', sans-serif;
    }
    .btn {
      transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      transform: scale(1);
      cursor: pointer;
    }
    .btn:active {
      transform: scale(0.96);
    }
    .glass-card {
      background: rgba(18, 12, 28, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 105, 180, 0.25);
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.6), 0 0 0 0.5px rgba(255, 105, 180, 0.15);
    }
    #display {
      font-family: 'Inter', monospace;
      letter-spacing: 1px;
      transition: all 0.2s;
    }
    /* Professional 7 animation */
    .seven-glow {
      animation: sevenPulse 0.5s ease-in-out 2, textGlow 0.6s ease-in-out;
    }
    @keyframes sevenPulse {
      0% { transform: scale(1); text-shadow: 0 0 0px #ff99cc; }
      50% { transform: scale(1.02); text-shadow: 0 0 12px #ff66aa, 0 0 8px #ff3388; }
      100% { transform: scale(1); text-shadow: 0 0 0px #ff99cc; }
    }
    @keyframes textGlow {
      0% { color: #ffffff; }
      50% { color: #ffc0d0; }
      100% { color: #ffffff; }
    }
    /* Graceful heart animation */
    .floating-heart {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      font-size: 1.3rem;
      opacity: 0;
      filter: drop-shadow(0 4px 12px rgba(255, 50, 120, 0.4));
      animation: floatHeart 2.5s cubic-bezier(0.2, 0.8, 0.4, 1) forwards;
    }
    @keyframes floatHeart {
      0% { transform: translateY(0px) translateX(0px) scale(0.5); opacity: 0; }
      20% { opacity: 0.9; transform: translateY(-20px) translateX(5px) scale(0.9); }
      50% { transform: translateY(-60px) translateX(-8px) scale(1.1); opacity: 0.8; }
      80% { transform: translateY(-100px) translateX(5px) scale(0.8); opacity: 0.4; }
      100% { transform: translateY(-140px) translateX(-10px) scale(0.5); opacity: 0; }
    }
    /* Ripple effect */
    .ripple-effect {
      position: fixed;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 105, 180, 0.6), rgba(255, 20, 147, 0.2));
      transform: scale(0);
      animation: rippleExpand 0.8s ease-out forwards;
      pointer-events: none;
      z-index: 9998;
    }
    @keyframes rippleExpand {
      0% { transform: scale(0); opacity: 0.7; }
      100% { transform: scale(15); opacity: 0; }
    }
    .card-glow {
      animation: cardGentleGlow 0.8s ease-in-out 2;
    }
    @keyframes cardGentleGlow {
      0% { border-color: rgba(255, 105, 180, 0.25); box-shadow: 0 25px 45px -12px rgba(0,0,0,0.6); }
      50% { border-color: rgba(255, 80, 160, 0.9); box-shadow: 0 0 20px rgba(255, 80, 160, 0.5), 0 25px 45px -12px black; }
      100% { border-color: rgba(255, 105, 180, 0.25); box-shadow: 0 25px 45px -12px rgba(0,0,0,0.6); }
    }
    .btn-equal {
      position: relative;
      overflow: hidden;
    }
    .btn-equal::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -60%;
      width: 200%;
      height: 200%;
      background: linear-gradient(115deg, rgba(255,255,255,0) 10%, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0) 90%);
      transform: rotate(25deg);
      animation: shineMove 4s infinite;
    }
    @keyframes shineMove {
      0% { transform: translateX(-100%) rotate(25deg);}
      20% { transform: translateX(100%) rotate(25deg);}
      100% { transform: translateX(100%) rotate(25deg);}
    }
    /* Music Player Button */
    .music-player-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 10000;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(12px);
      border-radius: 60px;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      border: 1px solid rgba(255,105,180,0.6);
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .music-player-btn:active {
      transform: scale(0.96);
    }
    .music-player-btn i {
      font-size: 20px;
      color: #ff99cc;
      transition: all 0.2s;
    }
    .music-player-btn span {
      font-size: 13px;
      font-weight: 500;
      color: #ffe0f0;
      letter-spacing: 0.5px;
      font-family: monospace;
    }
    @keyframes musicPulse {
      0% { text-shadow: 0 0 0px #ff69b4; }
      100% { text-shadow: 0 0 6px #ff69b4; }
    }
    .music-pulse {
      animation: musicPulse 1s infinite alternate;
    }
    @media (max-width: 480px) {
      .glass-card { width: 95%; padding: 1.2rem; }
      .btn { padding: 0.8rem 0; font-size: 1.2rem; }
      .music-player-btn { padding: 6px 14px; bottom: 14px; right: 14px; }
      .music-player-btn span { font-size: 11px; }
    }
  </style>
</head>

  <!-- 🎵 Dedicated Music Control Button (Play/Pause) + Autoplay on first ANY interaction -->
  <div id="musicControlBtn" class="music-player-btn">
    <i id="musicIcon" class="fas fa-play"></i>
    <span id="musicLabel">Play Love Song</span>
  </div>

  <audio id="bgMusic" preload="auto" loop>
    <source src="audio.mp3" type="audio/mpeg">
  </audio>

  <script>
    // ========== PROFESSIONAL MUSIC CONTROLLER WITH 100% RELIABLE PLAY/PAUSE + FIRST TAP TRIGGER ==========
    (function() {
      const audio = document.getElementById('bgMusic');
      const musicIcon = document.getElementById('musicIcon');
      const musicLabel = document.getElementById('musicLabel');
      const controlBtn = document.getElementById('musicControlBtn');
      
      let isPlaying = false;
      let userInteracted = false;     // whether first interaction has occurred
      let audioInitialized = false;
      
      // Set default volume and load
      if (audio) {
        audio.volume = 0.65;
        audio.loop = true;
        audio.preload = 'auto';
        // Force load to ensure quick playback
        audio.load();
      }
      
      // Update UI based on playing state
      function updateMusicUI(playing) {
        if (playing) {
          musicIcon.className = 'fas fa-pause';
          musicLabel.innerText = 'Pause Melody';
          musicIcon.style.color = '#ff66aa';
          controlBtn.style.borderColor = '#ff66aa';
          controlBtn.style.boxShadow = '0 0 8px rgba(255,105,180,0.5)';
        } else {
          musicIcon.className = 'fas fa-play';
          musicLabel.innerText = 'Play Love Song';
          musicIcon.style.color = '#ff99cc';
          controlBtn.style.borderColor = 'rgba(255,105,180,0.6)';
          controlBtn.style.boxShadow = 'none';
        }
      }
      
      // Core play function with robust error handling
      function startPlayback() {
        if (!audio) return Promise.reject('no audio');
        // if already playing and not paused
        if (isPlaying && !audio.paused) return Promise.resolve();
        
        const playPromise = audio.play();
        if (playPromise !== undefined) {
          return playPromise.then(() => {
            isPlaying = true;
            updateMusicUI(true);
          }).catch(err => {
            console.warn("Audio play failed:", err);
            isPlaying = false;
            updateMusicUI(false);
            return Promise.reject(err);
          });
        } else {
          // Fallback for legacy
          audio.play();
          isPlaying = true;
          updateMusicUI(true);
          return Promise.resolve();
        }
      }
      
      // Pause function
      function pausePlayback() {
        if (audio && !audio.paused) {
          audio.pause();
          isPlaying = false;
          updateMusicUI(false);
        } else {
          isPlaying = false;
          updateMusicUI(false);
        }
      }
      
      // Toggle play/pause (for button)
      function togglePlayPause() {
        if (!audio) return;
        if (isPlaying && !audio.paused) {
          pausePlayback();
        } else {
          startPlayback().catch(e => {
            // If still fails, show visual feedback but retry not needed
            console.log("Retry after interaction needed");
          });
        }
      }
      
      // ========== FIRST USER INTERACTION (ANYWHERE ON PAGE) ==========
      // This will trigger autoplay on first tap/click/keyboard anywhere on website
      function handleFirstGlobalInteraction(e) {
        if (userInteracted) return;
        userInteracted = true;
        
        // Remove all global listeners after first interaction
        document.removeEventListener('click', handleFirstGlobalInteraction);
        document.removeEventListener('touchstart', handleFirstGlobalInteraction);
        document.removeEventListener('keydown', handleFirstGlobalInteraction);
        window.removeEventListener('click', handleFirstGlobalInteraction);
        window.removeEventListener('touchstart', handleFirstGlobalInteraction);
        
        // Attempt to start music automatically (without needing to press button)
        startPlayback().then(() => {
          // Success: show subtle heart effect for user feedback
          showMusicStartedEffect();
        }).catch(err => {
          // In case browser blocks autoplay even with user interaction (rare but possible on some mobile browsers)
          // We'll set the UI to indicate that manual play may be required, but user can tap button
          console.warn("Auto-start failed, but user can press button");
          updateMusicUI(false);
          // Show a short reminder that button can play
          musicLabel.innerText = "Tap to Play ♪";
          setTimeout(() => {
            if (!isPlaying) musicLabel.innerText = "Play Love Song";
          }, 1800);
        });
      }
      
      function showMusicStartedEffect() {
        // little floating music note to confirm music started
        const note = document.createElement('div');
        note.innerHTML = '🎵✨';
        note.style.position = 'fixed';
        note.style.bottom = '80px';
        note.style.right = '30px';
        note.style.fontSize = '24px';
        note.style.zIndex = '10001';
        note.style.opacity = '0.9';
        note.style.pointerEvents = 'none';
        note.style.transition = 'opacity 1s ease';
        note.style.filter = 'drop-shadow(0 0 6px #ff66aa)';
        document.body.appendChild(note);
        setTimeout(() => { note.style.opacity = '0'; }, 1000);
        setTimeout(() => note.remove(), 1500);
      }
      
      // Attach global listeners to document and window (covers all)
      function attachGlobalListeners() {
        document.addEventListener('click', handleFirstGlobalInteraction);
        document.addEventListener('touchstart', handleFirstGlobalInteraction);
        document.addEventListener('keydown', handleFirstGlobalInteraction);
        window.addEventListener('click', handleFirstGlobalInteraction);
        window.addEventListener('touchstart', handleFirstGlobalInteraction);
      }
      
      // Music button click event (explicit control)
      if (controlBtn) {
        controlBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          // Mark that user has interacted globally as well (to avoid duplicate)
          if (!userInteracted) {
            userInteracted = true;
            // Remove global listeners so we don't double fire
            document.removeEventListener('click', handleFirstGlobalInteraction);
            document.removeEventListener('touchstart', handleFirstGlobalInteraction);
            window.removeEventListener('click', handleFirstGlobalInteraction);
            window.removeEventListener('touchstart', handleFirstGlobalInteraction);
          }
          togglePlayPause();
        });
      }
      
      // Ensure that when page is hidden, we don't break (optional)
      document.addEventListener('visibilitychange', () => {
        if (document.hidden && audio && !audio.paused) {
          // No action needed, but we keep playing in background allowed
        }
      });
      
      // Initialize - set UI initial state
      updateMusicUI(false);
      attachGlobalListeners();
      
      // Preload little extra: if audio can't load due to missing file, we show gentle fallback but still functional
      audio.addEventListener('error', (e) => {
        console.warn("Audio file missing or unsupported format, but love remains");
        musicLabel.innerText = "❤️ Love Eternal";
        musicIcon.className = 'fas fa-heart';
        controlBtn.style.opacity = '0.8';
      });
    })();
    
    // ========== CALCULATOR ENGINE ==========
    const calculator = (function() {
      const displayElement = document.getElementById("display");
      const footerElement = document.getElementById("footerMessage");
      const cardElement = document.getElementById("calcCard");
      
      function createHeart(x, y) {
        const hearts = ['❤️', '💖', '💗', '💓', '💕', '💞', '🌸', '🌹'];
        const heartDiv = document.createElement('div');
        heartDiv.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
        heartDiv.className = 'floating-heart';
        let posX = x;
        let posY = y;
        if (!posX || !posY) {
          const rect = displayElement.getBoundingClientRect();
          posX = rect.left + rect.width / 2 + (Math.random() - 0.5) * 80;
          posY = rect.bottom - 10;
        }
        heartDiv.style.left = posX + 'px';
        heartDiv.style.top = posY + 'px';
        document.body.appendChild(heartDiv);
        setTimeout(() => { if(heartDiv.remove) heartDiv.remove(); }, 2500);
      }
      
      function createRipple(x, y) {
        const ripple = document.createElement('div');
        ripple.className = 'ripple-effect';
        ripple.style.left = (x - 40) + 'px';
        ripple.style.top = (y - 40) + 'px';
        ripple.style.width = '80px';
        ripple.style.height = '80px';
        document.body.appendChild(ripple);
        setTimeout(() => ripple.remove(), 800);
      }
      
      function triggerSevenAnimation() {
        displayElement.classList.add('seven-glow');
        setTimeout(() => displayElement.classList.remove('seven-glow'), 800);
        cardElement.classList.add('card-glow');
        setTimeout(() => cardElement.classList.remove('card-glow'), 1000);
        const rect = displayElement.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const baseY = rect.bottom - 5;
        for (let i = 0; i < 14; i++) {
          setTimeout(() => {
            const offsetX = (Math.random() - 0.5) * 120;
            const offsetY = (Math.random() - 0.5) * 25;
            createHeart(centerX + offsetX, baseY + offsetY);
          }, i * 50);
        }
        setTimeout(() => createRipple(centerX, baseY), 100);
        setTimeout(() => createRipple(centerX - 20, baseY + 5), 300);
        footerElement.innerHTML = "✨ 7 — She lives in every calculation ✨ 💫";
        setTimeout(() => {
          if(footerElement.innerHTML.includes("7 — She")) footerElement.innerHTML = "💖 \"Some calculations never end... Just like our story\" 💖";
        }, 2600);
        document.body.style.transition = "background 0.5s ease";
        document.body.style.background = "radial-gradient(circle at 40% 30%, #ff69b460, #1a0033, #0a0a1a)";
        setTimeout(() => document.body.style.background = "", 700);
      }
      
      function updateDisplay(value) {
        if (displayElement.value === "Error") displayElement.value = "";
        displayElement.value += value;
        if (footerElement.innerHTML.includes("7 — She") || footerElement.innerHTML.includes("Some calculations never end")) {
          footerElement.innerHTML = "💖 \"Every sum leads to your heartbeat\" 💖";
        }
      }
      
      function clearDisplay() {
        displayElement.value = "";
        displayElement.classList.remove('seven-glow');
        footerElement.innerHTML = "💖 \"Every sum leads to your heartbeat\" 💖";
        cardElement.classList.remove('card-glow');
      }
      
      function calculateResult() {
        let expr = displayElement.value.trim();
        if (expr === "") { displayElement.value = "0"; return; }
        try {
          let result = Function('"use strict";return (' + expr + ')')();
          if (typeof result === 'number') result = parseFloat(result.toFixed(8));
          const resultStr = result.toString();
          displayElement.value = resultStr;
          
          if (Math.abs(result - 7) < 0.0000001) {
            triggerSevenAnimation();
          } else if (Math.abs(result - 143) < 0.0000001) {
            footerElement.innerHTML = "💌 1-4-3 : I LOVE YOU ADITYA & KASHISH 💌";
            const rect = displayElement.getBoundingClientRect();
            for (let i = 0; i < 12; i++) {
              setTimeout(() => createHeart(rect.left + rect.width/2 + (Math.random()-0.5)*70, rect.bottom - 5), i * 70);
            }
            setTimeout(() => {
              if (footerElement.innerHTML.includes("LOVE")) footerElement.innerHTML = "💖 \"Every sum leads to your heartbeat\" 💖";
            }, 3200);
          } else if (Math.abs(result - 786) < 0.0000001) {
            footerElement.innerHTML = "🤲✨ Blessings of eternal love ✨🤲";
            setTimeout(() => footerElement.innerHTML = "💖 \"Every sum leads to your heartbeat\" 💖", 2800);
            const rect = displayElement.getBoundingClientRect();
            for (let i = 0; i < 8; i++) setTimeout(() => createHeart(rect.left + rect.width/2 + (Math.random()-0.5)*60, rect.bottom - 5), i * 100);
          } else {
            displayElement.classList.remove('seven-glow');
            const loveMsgs = ["💗 Love is infinite decimals", "🌸 She dances in every number", "💖 Forever counting memories", "✨ Digits of destiny align", "❤️ Aditya + Kashish = ∞", "🎵 This melody is for you"];
            if (Math.random() > 0.8) {
              footerElement.innerHTML = loveMsgs[Math.floor(Math.random() * loveMsgs.length)];
              setTimeout(() => {
                if (!footerElement.innerHTML.includes("LOVE") && !footerElement.innerHTML.includes("7 — She") && !footerElement.innerHTML.includes("Blessings"))
                  footerElement.innerHTML = "💖 \"Every sum leads to your heartbeat\" 💖";
              }, 2200);
            }
          }
        } catch (error) {
          displayElement.value = "Error";
          footerElement.innerHTML = "💔 Infinite loop of love... try again 💔";
          setTimeout(() => {
            if (displayElement.value === "Error") footerElement.innerHTML = "💖 \"Some calculations never end...\" 💖";
          }, 1600);
        }
      }
      
      return { updateDisplay, clearDisplay, calculateResult };
    })();
    
    // Attach calculator button events
    function bindCalculatorEvents() {
      document.querySelectorAll('[data-num]').forEach(btn => {
        btn.addEventListener('click', (e) => { e.stopPropagation(); calculator.updateDisplay(btn.getAttribute('data-num')); });
      });
      document.querySelectorAll('[data-op]').forEach(btn => {
        btn.addEventListener('click', (e) => { e.stopPropagation(); calculator.updateDisplay(btn.getAttribute('data-op')); });
      });
      const clearBtn = document.querySelector('[data-action="clear"]');
      if (clearBtn) clearBtn.addEventListener('click', (e) => { e.stopPropagation(); calculator.clearDisplay(); });
      const equalBtn = document.querySelector('[data-action="equal"]');
      if (equalBtn) equalBtn.addEventListener('click', (e) => { e.stopPropagation(); calculator.calculateResult(); });
    }
    
    // Ripple effect on buttons
    function addGlobalRipple() {
      document.querySelectorAll('.btn').forEach(btn => {
        btn.addEventListener('click', function(e) {
          const rect = this.getBoundingClientRect();
          const rippleSpan = document.createElement('span');
          rippleSpan.style.position = 'absolute';
          rippleSpan.style.width = '28px';
          rippleSpan.style.height = '28px';
          rippleSpan.style.background = 'radial-gradient(circle, rgba(255,200,220,0.8), rgba(255,105,180,0.3))';
          rippleSpan.style.borderRadius = '50%';
          rippleSpan.style.pointerEvents = 'none';
          rippleSpan.style.transform = 'translate(-50%, -50%) scale(0)';
          rippleSpan.style.transition = 'transform 0.35s ease-out, opacity 0.4s';
          rippleSpan.style.left = (e.clientX - rect.left) + 'px';
          rippleSpan.style.top = (e.clientY - rect.top) + 'px';
          rippleSpan.style.opacity = '0.9';
          this.style.position = 'relative';
          this.style.overflow = 'hidden';
          this.appendChild(rippleSpan);
          requestAnimationFrame(() => {
            rippleSpan.style.transform = 'translate(-50%, -50%) scale(9)';
            rippleSpan.style.opacity = '0';
          });
          setTimeout(() => rippleSpan.remove(), 450);
        });
      });
    }
    
    function keyboardSupport() {
      document.addEventListener('keydown', (e) => {
        const key = e.key;
        if ((key >= '0' && key <= '9') || key === '.' || key === '+' || key === '-' || key === '*' || key === '/') {
          e.preventDefault();
          if (key === '*') calculator.updateDisplay('*');
          else if (key === '/') calculator.updateDisplay('/');
          else calculator.updateDisplay(key);
        } else if (key === 'Enter' || key === '=') { e.preventDefault(); calculator.calculateResult(); }
        else if (key === 'Escape' || key === 'c' || key === 'C') { e.preventDefault(); calculator.clearDisplay(); }
        else if (key === 'Backspace') { e.preventDefault(); let disp = document.getElementById("display"); disp.value = disp.value.slice(0, -1); }
      });
    }
    
    function startParticles() {
      setInterval(() => {
        const particle = document.createElement('div');
        particle.style.position = 'fixed';
        particle.style.width = '2.5px';
        particle.style.height = '2.5px';
        particle.style.background = `rgba(255, 120, 160, ${Math.random() * 0.5 + 0.2})`;
        particle.style.borderRadius = '50%';
        particle.style.left = Math.random() * window.innerWidth + 'px';
        particle.style.top = Math.random() * window.innerHeight + 'px';
        particle.style.pointerEvents = 'none';
        particle.style.zIndex = '0';
        document.body.appendChild(particle);
        setTimeout(() => particle.remove(), 4000);
      }, 1200);
    }
    
    bindCalculatorEvents();
    addGlobalRipple();
    keyboardSupport();
    startParticles();
    document.getElementById("display").value = "";
  </script>
</body>
</html>
