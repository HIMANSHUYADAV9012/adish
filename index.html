<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Aditya ❤️ Kashish | Eternal Love Calculator</title>
  <!-- Tailwind + Font Awesome + Google Fonts -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,500;14..32,700&display=swap" rel="stylesheet">
  <style>
    * {
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    body {
      font-family: 'Inter', sans-serif;
    }
    .btn {
      transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      transform: scale(1);
      cursor: pointer;
    }
    .btn:active {
      transform: scale(0.96);
    }
    .glass-card {
      background: rgba(18, 12, 28, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 105, 180, 0.25);
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.6), 0 0 0 0.5px rgba(255, 105, 180, 0.15);
    }
    #display {
      font-family: 'Inter', monospace;
      letter-spacing: 1px;
      transition: all 0.2s;
    }
    /* Professional 7 animation */
    .seven-glow {
      animation: sevenPulse 0.5s ease-in-out 2, textGlow 0.6s ease-in-out;
    }
    @keyframes sevenPulse {
      0% { transform: scale(1); text-shadow: 0 0 0px #ff99cc; }
      50% { transform: scale(1.02); text-shadow: 0 0 12px #ff66aa, 0 0 8px #ff3388; }
      100% { transform: scale(1); text-shadow: 0 0 0px #ff99cc; }
    }
    @keyframes textGlow {
      0% { color: #ffffff; }
      50% { color: #ffc0d0; }
      100% { color: #ffffff; }
    }
    /* Graceful heart animation - slow and elegant */
    .floating-heart {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      font-size: 1.3rem;
      opacity: 0;
      filter: drop-shadow(0 4px 12px rgba(255, 50, 120, 0.4));
      animation: floatHeart 2.5s cubic-bezier(0.2, 0.8, 0.4, 1) forwards;
    }
    @keyframes floatHeart {
      0% {
        transform: translateY(0px) translateX(0px) scale(0.5);
        opacity: 0;
      }
      20% {
        opacity: 0.9;
        transform: translateY(-20px) translateX(5px) scale(0.9);
      }
      50% {
        transform: translateY(-60px) translateX(-8px) scale(1.1);
        opacity: 0.8;
      }
      80% {
        transform: translateY(-100px) translateX(5px) scale(0.8);
        opacity: 0.4;
      }
      100% {
        transform: translateY(-140px) translateX(-10px) scale(0.5);
        opacity: 0;
      }
    }
    /* Ripple effect */
    .ripple-effect {
      position: fixed;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 105, 180, 0.6), rgba(255, 20, 147, 0.2));
      transform: scale(0);
      animation: rippleExpand 0.8s ease-out forwards;
      pointer-events: none;
      z-index: 9998;
    }
    @keyframes rippleExpand {
      0% { transform: scale(0); opacity: 0.7; }
      100% { transform: scale(15); opacity: 0; }
    }
    /* Card glow animation */
    .card-glow {
      animation: cardGentleGlow 0.8s ease-in-out 2;
    }
    @keyframes cardGentleGlow {
      0% { border-color: rgba(255, 105, 180, 0.25); box-shadow: 0 25px 45px -12px rgba(0,0,0,0.6); }
      50% { border-color: rgba(255, 80, 160, 0.9); box-shadow: 0 0 20px rgba(255, 80, 160, 0.5), 0 25px 45px -12px black; }
      100% { border-color: rgba(255, 105, 180, 0.25); box-shadow: 0 25px 45px -12px rgba(0,0,0,0.6); }
    }
    .btn-equal {
      position: relative;
      overflow: hidden;
    }
    .btn-equal::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -60%;
      width: 200%;
      height: 200%;
      background: linear-gradient(115deg, rgba(255,255,255,0) 10%, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0) 90%);
      transform: rotate(25deg);
      animation: shineMove 4s infinite;
    }
    @keyframes shineMove {
      0% { transform: translateX(-100%) rotate(25deg);}
      20% { transform: translateX(100%) rotate(25deg);}
      100% { transform: translateX(100%) rotate(25deg);}
    }
    @media (max-width: 480px) {
      .glass-card {
        width: 95%;
        padding: 1.2rem;
      }
      .btn {
        padding: 0.8rem 0;
        font-size: 1.2rem;
      }
      .floating-heart {
        font-size: 1.1rem;
      }
    }

    /* Music indicator */
    .music-indicator {
      position: fixed;
      bottom: 18px;
      right: 18px;
      z-index: 10000;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      padding: 8px 12px;
      border-radius: 60px;
      font-size: 12px;
      color: #ff99cc;
      border: 1px solid rgba(255,105,180,0.5);
      font-weight: 500;
      pointer-events: none;
      transition: opacity 0.3s;
      font-family: monospace;
      letter-spacing: 0.5px;
    }
    .music-indicator i {
      margin-right: 6px;
      animation: pulseNote 1.2s infinite;
    }
    @keyframes pulseNote {
      0% { opacity: 0.5; text-shadow: 0 0 0px pink; }
      100% { opacity: 1; text-shadow: 0 0 6px #ff69b4; }
    }
  </style>
</head>

  <!-- 🎵 Background Love Music - embedded as base64 silent fallback but actual audio.mp3 will be used with robust autoplay -->

  <script>
    // ======================== PROFESSIONAL MUSIC CONTROLLER WITH INSTANT PLAY ON FIRST TOUCH ========================
    (function() {
      const music = document.getElementById("bgMusic");
      const musicStatusSpan = document.getElementById("musicStatus");
      let musicPlayed = false;        // has music ever been successfully played?
      let playAttempted = false;      // prevent multiple fade-in triggers
      
      // Function to update indicator text
      function setMusicStatusText(playing) {
        if (musicStatusSpan) {
          if (playing) {
            musicStatusSpan.innerHTML = "🎵 Love Melody ♪";
            musicStatusSpan.style.color = "#ff99cc";
          } else {
            musicStatusSpan.innerHTML = "♥ Touch to play ♥";
            musicStatusSpan.style.color = "#ffb3d9";
          }
        }
      }
      
      // Actually start playback with fade-in (pro feel)
      function startMusicWithFade() {
        if (!music) return;
        if (musicPlayed) return;
        
        // Reset and play
        music.volume = 0;
        music.currentTime = 0;
        
        const playPromise = music.play();
        if (playPromise !== undefined) {
          playPromise.then(() => {
            musicPlayed = true;
            setMusicStatusText(true);
            // Smooth fade-in over 1.2 seconds
            let vol = 0;
            const fadeInterval = setInterval(() => {
              if (vol < 0.65) {
                vol += 0.05;
                music.volume = vol;
              } else {
                music.volume = 0.7;
                clearInterval(fadeInterval);
              }
            }, 80);
          }).catch((err) => {
            console.warn("Audio play failed on interaction:", err);
            // fallback: retry once after a short delay? not needed as user will trigger again.
            setMusicStatusText(false);
          });
        } else {
          // old browser fallback
          musicPlayed = true;
          music.volume = 0.7;
          setMusicStatusText(true);
        }
      }
      
      // UNIVERSAL FIRST-INTERACTION HANDLER (touch, click, keydown) - plays music immediately on first user engagement
      function handleFirstUserInteraction(e) {
        if (playAttempted) return;
        playAttempted = true;
        
        // Remove all listeners after first capture
        document.removeEventListener("touchstart", handleFirstUserInteraction);
        document.removeEventListener("click", handleFirstUserInteraction);
        document.removeEventListener("keydown", handleFirstUserInteraction);
        
        // Also remove from window for safety
        window.removeEventListener("touchstart", handleFirstUserInteraction);
        window.removeEventListener("click", handleFirstUserInteraction);
        
        // Initiate music playback instantly
        startMusicWithFade();
        
        // Optional: Add subtle vibration if supported? not needed but adds magic
        // Also show a tiny heart burst as thanks for starting music
        const heartDiv = document.createElement('div');
        heartDiv.innerHTML = '🎵✨';
        heartDiv.style.position = 'fixed';
        heartDiv.style.bottom = '70px';
        heartDiv.style.right = '20px';
        heartDiv.style.fontSize = '22px';
        heartDiv.style.zIndex = '10001';
        heartDiv.style.opacity = '0.8';
        heartDiv.style.pointerEvents = 'none';
        heartDiv.style.transition = 'opacity 1s';
        document.body.appendChild(heartDiv);
        setTimeout(() => heartDiv.style.opacity = '0', 1000);
        setTimeout(() => heartDiv.remove(), 1500);
      }
      
      // Additionally, we need to ensure that the audio element is ready and preloaded.
      // For browsers that block autoplay without user interaction, we set the flag.
      // Also if someone already interacted before script load? we attach listeners early.
      function initMusic() {
        // Set initial text status
        setMusicStatusText(false);
        // Preload audio metadata: set volume default
        if (music) {
          music.volume = 0.7;
          music.loop = true;
          // optional: force load
          music.load();
        }
        
        // Attach listeners to document AND window to capture first touch/click/key
        document.addEventListener("touchstart", handleFirstUserInteraction, { passive: false });
        document.addEventListener("click", handleFirstUserInteraction);
        document.addEventListener("keydown", handleFirstUserInteraction);
        window.addEventListener("touchstart", handleFirstUserInteraction);
        window.addEventListener("click", handleFirstUserInteraction);
        
        // Additionally, the calculator buttons will also trigger interaction via event bubbling.
        // That's perfect because any tap on calculator will start the music.
        // Also guarantee that if the user interacts with any part of UI, music starts.
      }
      
      initMusic();
    })();
    
    // ======================== CALCULATOR MODULE (enhanced, no recursion, integrated love effects) ========================
    const calculator = (function() {
      let displayElement = document.getElementById("display");
      let footerElement = document.getElementById("footerMessage");
      let cardElement = document.getElementById("calcCard");
      
      function createHeart(x, y) {
        const hearts = ['❤️', '💖', '💗', '💓', '💕', '💞', '🌸', '🌹'];
        const heart = document.createElement('div');
        heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
        heart.className = 'floating-heart';
        let posX = x;
        let posY = y;
        if (!posX || !posY) {
          const rect = displayElement.getBoundingClientRect();
          posX = rect.left + rect.width / 2 + (Math.random() - 0.5) * 80;
          posY = rect.bottom - 10;
        }
        heart.style.left = posX + 'px';
        heart.style.top = posY + 'px';
        document.body.appendChild(heart);
        setTimeout(() => { if(heart && heart.remove) heart.remove(); }, 2500);
      }
      
      function createRipple(x, y) {
        const ripple = document.createElement('div');
        ripple.className = 'ripple-effect';
        ripple.style.left = (x - 40) + 'px';
        ripple.style.top = (y - 40) + 'px';
        ripple.style.width = '80px';
        ripple.style.height = '80px';
        document.body.appendChild(ripple);
        setTimeout(() => ripple.remove(), 800);
      }
      
      function triggerSevenAnimation() {
        displayElement.classList.add('seven-glow');
        setTimeout(() => displayElement.classList.remove('seven-glow'), 800);
        cardElement.classList.add('card-glow');
        setTimeout(() => cardElement.classList.remove('card-glow'), 1000);
        const rect = displayElement.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const baseY = rect.bottom - 5;
        for (let i = 0; i < 14; i++) {
          setTimeout(() => {
            const offsetX = (Math.random() - 0.5) * 120;
            const offsetY = (Math.random() - 0.5) * 25;
            createHeart(centerX + offsetX, baseY + offsetY);
          }, i * 50);
        }
        setTimeout(() => createRipple(centerX, baseY), 100);
        setTimeout(() => createRipple(centerX - 20, baseY + 5), 300);
        const originalMsg = footerElement.innerHTML;
        footerElement.innerHTML = "✨ 7 — She lives in every calculation ✨ 💫";
        setTimeout(() => {
          if(footerElement.innerHTML.includes("7 — She")) footerElement.innerHTML = "💖 \"Some calculations never end... Just like our story\" 💖";
        }, 2600);
        document.body.style.transition = "background 0.5s ease";
        document.body.style.background = "radial-gradient(circle at 40% 30%, #ff69b460, #1a0033, #0a0a1a)";
        setTimeout(() => document.body.style.background = "", 700);
      }
      
      function updateDisplay(value) {
        if (displayElement.value === "Error") displayElement.value = "";
        displayElement.value += value;
        if (footerElement.innerHTML.includes("7 — She") || footerElement.innerHTML.includes("Some calculations never end")) {
          footerElement.innerHTML = "💖 \"Every sum leads to your heartbeat\" 💖";
        }
      }
      
      function clearDisplay() {
        displayElement.value = "";
        displayElement.classList.remove('seven-glow');
        footerElement.innerHTML = "💖 \"Every sum leads to your heartbeat\" 💖";
        cardElement.classList.remove('card-glow');
      }
      
      function calculateResult() {
        let expression = displayElement.value.trim();
        if (expression === "") {
          displayElement.value = "0";
          return;
        }
        try {
          let result = Function('"use strict";return (' + expression + ')')();
          if (typeof result === 'number') result = parseFloat(result.toFixed(8));
          const resultStr = result.toString();
          displayElement.value = resultStr;
          
          // MAGIC 7
          if (Math.abs(result - 7) < 0.0000001) {
            triggerSevenAnimation();
          }
          // 143 love code
          else if (Math.abs(result - 143) < 0.0000001) {
            footerElement.innerHTML = "💌 1-4-3 : I LOVE YOU ADITYA & KASHISH 💌";
            const rect = displayElement.getBoundingClientRect();
            for (let i = 0; i < 10; i++) {
              setTimeout(() => createHeart(rect.left + rect.width/2 + (Math.random()-0.5)*70, rect.bottom - 5), i * 70);
            }
            setTimeout(() => {
              if (footerElement.innerHTML.includes("LOVE")) footerElement.innerHTML = "💖 \"Every sum leads to your heartbeat\" 💖";
            }, 3200);
          }
          // 786 blessings
          else if (Math.abs(result - 786) < 0.0000001) {
            footerElement.innerHTML = "🤲✨ Blessings of eternal love ✨🤲";
            setTimeout(() => footerElement.innerHTML = "💖 \"Every sum leads to your heartbeat\" 💖", 2800);
            const rect = displayElement.getBoundingClientRect();
            for (let i = 0; i < 8; i++) setTimeout(() => createHeart(rect.left + rect.width/2 + (Math.random()-0.5)*60, rect.bottom - 5), i * 100);
          }
          else {
            displayElement.classList.remove('seven-glow');
            const loveMessages = ["💗 Love is infinite decimals", "🌸 She dances in every number", "💖 Forever counting memories", "✨ Digits of destiny align", "❤️ Aditya + Kashish = ∞", "🎵 This melody is for you"];
            if (Math.random() > 0.8) {
              footerElement.innerHTML = loveMessages[Math.floor(Math.random() * loveMessages.length)];
              setTimeout(() => {
                if (!footerElement.innerHTML.includes("LOVE") && !footerElement.innerHTML.includes("7 — She") && !footerElement.innerHTML.includes("Blessings"))
                  footerElement.innerHTML = "💖 \"Every sum leads to your heartbeat\" 💖";
              }, 2200);
            }
          }
        } catch (error) {
          displayElement.value = "Error";
          footerElement.innerHTML = "💔 Infinite loop of love... try again 💔";
          setTimeout(() => {
            if (displayElement.value === "Error") footerElement.innerHTML = "💖 \"Some calculations never end...\" 💖";
          }, 1600);
        }
      }
      
      return { updateDisplay, clearDisplay, calculateResult };
    })();
    
    // ========== ATTACH ALL BUTTON LISTENERS (with ripple effect) ==========
    function attachButtonEvents() {
      // Number & dot buttons
      document.querySelectorAll('[data-num]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const val = btn.getAttribute('data-num');
          calculator.updateDisplay(val);
        });
      });
      // Operator buttons
      document.querySelectorAll('[data-op]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const op = btn.getAttribute('data-op');
          calculator.updateDisplay(op);
        });
      });
      // Clear button
      const clearBtn = document.querySelector('[data-action="clear"]');
      if (clearBtn) clearBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        calculator.clearDisplay();
      });
      // Equal button
      const equalBtn = document.querySelector('[data-action="equal"]');
      if (equalBtn) equalBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        calculator.calculateResult();
      });
    }
    
    // Ripple effect for all buttons + additional smooth feedback
    function addRippleToButtons() {
      const btns = document.querySelectorAll('.btn');
      btns.forEach(btn => {
        btn.addEventListener('click', function(e) {
          const rectBtn = this.getBoundingClientRect();
          const rippleSpan = document.createElement('span');
          rippleSpan.style.position = 'absolute';
          rippleSpan.style.width = '28px';
          rippleSpan.style.height = '28px';
          rippleSpan.style.background = 'radial-gradient(circle, rgba(255,200,220,0.8), rgba(255,105,180,0.3))';
          rippleSpan.style.borderRadius = '50%';
          rippleSpan.style.pointerEvents = 'none';
          rippleSpan.style.transform = 'translate(-50%, -50%) scale(0)';
          rippleSpan.style.transition = 'transform 0.35s ease-out, opacity 0.4s';
          rippleSpan.style.left = (e.clientX - rectBtn.left) + 'px';
          rippleSpan.style.top = (e.clientY - rectBtn.top) + 'px';
          rippleSpan.style.opacity = '0.9';
          this.style.position = 'relative';
          this.style.overflow = 'hidden';
          this.appendChild(rippleSpan);
          requestAnimationFrame(() => {
            rippleSpan.style.transform = 'translate(-50%, -50%) scale(9)';
            rippleSpan.style.opacity = '0';
          });
          setTimeout(() => rippleSpan.remove(), 450);
        });
      });
    }
    
    // Keyboard Support
    function enableKeyboardSupport() {
      document.addEventListener('keydown', (e) => {
        const key = e.key;
        if ((key >= '0' && key <= '9') || key === '.' || key === '+' || key === '-' || key === '*' || key === '/') {
          e.preventDefault();
          if (key === '*') calculator.updateDisplay('*');
          else if (key === '/') calculator.updateDisplay('/');
          else calculator.updateDisplay(key);
        } else if (key === 'Enter' || key === '=') {
          e.preventDefault();
          calculator.calculateResult();
        } else if (key === 'Escape' || key === 'c' || key === 'C') {
          e.preventDefault();
          calculator.clearDisplay();
        } else if (key === 'Backspace') {
          e.preventDefault();
          let display = document.getElementById("display");
          display.value = display.value.slice(0, -1);
        }
      });
    }
    
    // Floating particles for romantic ambiance
    function startAmbientParticles() {
      setInterval(() => {
        const particle = document.createElement('div');
        particle.style.position = 'fixed';
        particle.style.width = '3px';
        particle.style.height = '3px';
        particle.style.background = `rgba(255, 120, 160, ${Math.random() * 0.5 + 0.2})`;
        particle.style.borderRadius = '50%';
        particle.style.left = Math.random() * window.innerWidth + 'px';
        particle.style.top = Math.random() * window.innerHeight + 'px';
        particle.style.pointerEvents = 'none';
        particle.style.zIndex = '0';
        particle.style.opacity = '0.6';
        document.body.appendChild(particle);
        setTimeout(() => particle.remove(), 4000);
      }, 1100);
    }
    
    // INIT ALL
    attachButtonEvents();
    addRippleToButtons();
    enableKeyboardSupport();
    startAmbientParticles();
    
    // also ensure display initial value zero
    document.getElementById("display").value = "";
  </script>
</body>
</html>
