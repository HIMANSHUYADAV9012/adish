  <style>
    * {
      -webkit-tap-highlight-color: transparent;
      user-select: none;

    body {
      font-family: 'Inter', sans-serif;
    }
    .btn {
      transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      transform: scale(1);
      cursor: pointer;
    }
    .btn:active {
      transform: scale(0.96);

    .glass-card {
      background: rgba(18, 12, 28, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 105, 180, 0.25);
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.6), 0 0 0 0.5px rgba(255, 105, 180, 0.15);
    }
    #display {
      font-family: 'Inter', monospace;
      letter-spacing: 1px;
      transition: all 0.2s;
    }
    /* Professional 7 animation */
    .seven-glow {
      animation: sevenPulse 0.5s ease-in-out 2, textGlow 0.6s ease-in-out;
    }
    @keyframes sevenPulse {
      0% { transform: scale(1); text-shadow: 0 0 0px #ff99cc; }
      50% { transform: scale(1.02); text-shadow: 0 0 12px #ff66aa, 0 0 8px #ff3388; }
      100% { transform: scale(1); text-shadow: 0 0 0px #ff99cc; }
    }
    @keyframes textGlow {
      0% { color: #ffffff; }
      50% { color: #ffc0d0; }
      100% { color: #ffffff; }
    }
    /* Graceful heart animation - slow and elegant */
    .floating-heart {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      font-size: 1.3rem;
      opacity: 0;
      filter: drop-shadow(0 4px 12px rgba(255, 50, 120, 0.4));
      animation: floatHeart 2.5s cubic-bezier(0.2, 0.8, 0.4, 1) forwards;
    }
    @keyframes floatHeart {
      0% {
        transform: translateY(0px) translateX(0px) scale(0.5);
        opacity: 0;
      }
      20% {
        opacity: 0.9;
        transform: translateY(-20px) translateX(5px) scale(0.9);
      }
      50% {
        transform: translateY(-60px) translateX(-8px) scale(1.1);
        opacity: 0.8;
      }
      80% {
        transform: translateY(-100px) translateX(5px) scale(0.8);
        opacity: 0.4;
      }
      100% {
        transform: translateY(-140px) translateX(-10px) scale(0.5);
        opacity: 0;
      }
    }
    /* Ripple effect */
    .ripple-effect {
      position: fixed;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 105, 180, 0.6), rgba(255, 20, 147, 0.2));
      transform: scale(0);
      animation: rippleExpand 0.8s ease-out forwards;
      pointer-events: none;
      z-index: 9998;
    }
    @keyframes rippleExpand {
      0% { transform: scale(0); opacity: 0.7; }
      100% { transform: scale(15); opacity: 0; }
    }
    /* Card glow animation */
    .card-glow {
      animation: cardGentleGlow 0.8s ease-in-out 2;
    }
    @keyframes cardGentleGlow {
      0% { border-color: rgba(255, 105, 180, 0.25); box-shadow: 0 25px 45px -12px rgba(0,0,0,0.6); }
      50% { border-color: rgba(255, 80, 160, 0.9); box-shadow: 0 0 20px rgba(255, 80, 160, 0.5), 0 25px 45px -12px black; }
      100% { border-color: rgba(255, 105, 180, 0.25); box-shadow: 0 25px 45px -12px rgba(0,0,0,0.6); }
    }
    .btn-equal {
      position: relative;
      overflow: hidden;
    }
    .btn-equal::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -60%;
      width: 200%;
      height: 200%;
      background: linear-gradient(115deg, rgba(255,255,255,0) 10%, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0) 90%);
      transform: rotate(25deg);
      animation: shineMove 4s infinite;
    }
    @keyframes shineMove {
      0% { transform: translateX(-100%) rotate(25deg);}
      20% { transform: translateX(100%) rotate(25deg);}
      100% { transform: translateX(100%) rotate(25deg);}
    }
    @media (max-width: 480px) {
      .glass-card {
        width: 95%;
        padding: 1.2rem;
      }
      .btn {
        padding: 0.8rem 0;
        font-size: 1.2rem;
      }
      .floating-heart {
        font-size: 1.1rem;
      }
    }
  </style>
</head>

<script>
  // 🎵 PRO MUSIC CONTROLLER
const MusicController = (function () {
  let music = document.getElementById("bgMusic");
  let isStarted = false;
  let isUnlocked = false;

  // Unlock audio on first interaction (browser policy fix)
  function unlockAudio() {
    if (!music || isUnlocked) return;

    const playPromise = music.play();
    if (playPromise !== undefined) {
      playPromise.then(() => {
        music.pause();
        music.currentTime = 0;
        isUnlocked = true;
      }).catch(() => {});
    }
  }

  // Start music only once
  function start() {
    if (!music || isStarted) return;

    music.volume = 0.7; // smooth volume
    music.play().then(() => {
      isStarted = true;
    }).catch(() => {
      console.log("Music play blocked");
    });
  }

  // Smooth fade-in (PRO feel)
  function fadeIn() {
    if (!music) return;
    music.volume = 0;
    music.play();

    let vol = 0;
    const interval = setInterval(() => {
      if (vol < 0.7) {
        vol += 0.05;
        music.volume = vol;
      } else {
        clearInterval(interval);
      }
    }, 100);
  }

  // First user interaction handler
  function handleFirstInteraction() {
    unlockAudio();
    fadeIn();
  }

  // Init listeners
  function init() {
    document.addEventListener("click", handleFirstInteraction, { once: true });
    document.addEventListener("touchstart", handleFirstInteraction, { once: true });
    document.addEventListener("keydown", handleFirstInteraction, { once: true });
  }

  return {
    init,
    start
  };
})();

// 🚀 Initialize
MusicController.init();
</script>




  <script>
    // Professional Calculator Object - No recursion issues
    const calculator = (function() {
      let displayElement = document.getElementById("display");
      let footerElement = document.getElementById("footerMessage");
      let cardElement = document.getElementById("calcCard");
      
      // Helper: Create floating heart (natural movement)
      function createHeart(x, y) {
        const hearts = ['❤️', '💖', '💗', '💓', '💕', '💞'];
        const heart = document.createElement('div');
        heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
        heart.className = 'floating-heart';
        
        // Use provided position or center of display
        let posX = x;
        let posY = y;
        if (!posX || !posY) {
          const rect = displayElement.getBoundingClientRect();
          posX = rect.left + rect.width / 2 + (Math.random() - 0.5) * 80;
          posY = rect.bottom - 10;
        }
        
        heart.style.left = posX + 'px';
        heart.style.top = posY + 'px';
        document.body.appendChild(heart);
        
        setTimeout(() => {
          if (heart && heart.remove) heart.remove();
        }, 2500);
      }
      
      // Helper: Create ripple effect
      function createRipple(x, y) {
        const ripple = document.createElement('div');
        ripple.className = 'ripple-effect';
        ripple.style.left = (x - 40) + 'px';
        ripple.style.top = (y - 40) + 'px';
        ripple.style.width = '80px';
        ripple.style.height = '80px';
        document.body.appendChild(ripple);
        setTimeout(() => ripple.remove(), 800);
      }
      
      // Magic animation for number 7
      function triggerSevenAnimation() {
        // 1. Display glow effect
        displayElement.classList.add('seven-glow');
        setTimeout(() => {
          displayElement.classList.remove('seven-glow');
        }, 800);
        
        // 2. Card border glow
        cardElement.classList.add('card-glow');
        setTimeout(() => {
          cardElement.classList.remove('card-glow');
        }, 1000);
        
        // 3. Create floating hearts from display area (12 hearts, staggered)
        const rect = displayElement.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const baseY = rect.bottom - 5;
        
        for (let i = 0; i < 14; i++) {
          setTimeout(() => {
            const offsetX = (Math.random() - 0.5) * 120;
            const offsetY = (Math.random() - 0.5) * 25;
            createHeart(centerX + offsetX, baseY + offsetY);
          }, i * 50);
        }
        
        // 4. Create ripples
        setTimeout(() => {
          createRipple(centerX, baseY);
        }, 100);
        setTimeout(() => {
          createRipple(centerX - 20, baseY + 5);
        }, 300);
        
        // 5. Update footer message
        const originalMsg = footerElement.innerHTML;
        footerElement.innerHTML = "✨ 7 — She lives in every calculation ✨ 💫";
        setTimeout(() => {
          footerElement.innerHTML = "💖 \"Some calculations never end... Just like our story\" 💖";
        }, 2500);
        
        // 6. Slight background shimmer
        document.body.style.transition = "background 0.5s ease";
        document.body.style.background = "radial-gradient(circle at 40% 30%, #ff69b460, #1a0033, #0a0a1a)";
        setTimeout(() => {
          document.body.style.background = "";
        }, 700);
      }
      
      // Public methods
      function append(value) {
        if (displayElement.value === "Error") {
          displayElement.value = "";
        }
        displayElement.value += value;
        // Reset footer if it was showing special message
        if (footerElement.innerHTML.includes("7 — She") || footerElement.innerHTML.includes("Some calculations never end")) {
          footerElement.innerHTML = "💖 \"Every sum leads to your heartbeat\" 💖";
        }
      }
      
      function clearDisplay() {
        displayElement.value = "";
        displayElement.classList.remove('seven-glow');
        footerElement.innerHTML = "💖 \"Every sum leads to your heartbeat\" 💖";
        cardElement.classList.remove('card-glow');
      }
      
      function calculate() {
        let expression = displayElement.value.trim();
        if (expression === "") {
          displayElement.value = "0";
          return;
        }
        
        try {
          // Safely evaluate the expression
          let result = Function('"use strict";return (' + expression + ')')();
          
          // Handle floating point precision
          if (typeof result === 'number') {
            result = parseFloat(result.toFixed(8));
          }
          
          const resultStr = result.toString();
          displayElement.value = resultStr;
          
          // Check if result is exactly 7
          if (Math.abs(result - 7) < 0.0000001) {
            triggerSevenAnimation();
          }
          // Easter egg: 143 = I Love You
          else if (Math.abs(result - 143) < 0.0000001) {
            footerElement.innerHTML = "💌 1-4-3 : I LOVE YOU ADITYA & KASHISH 💌";
            const rect = displayElement.getBoundingClientRect();
            for (let i = 0; i < 8; i++) {
              setTimeout(() => {
                createHeart(rect.left + rect.width/2 + (Math.random()-0.5)*70, rect.bottom - 5);
              }, i * 80);
            }
            setTimeout(() => {
              if (footerElement.innerHTML.includes("LOVE")) {
                footerElement.innerHTML = "💖 \"Every sum leads to your heartbeat\" 💖";
              }
            }, 3000);
          }
          // Easter egg: 786 (blessings)
          else if (Math.abs(result - 786) < 0.0000001) {
            footerElement.innerHTML = "🤲✨ Blessings of eternal love ✨🤲";
            setTimeout(() => {
              footerElement.innerHTML = "💖 \"Every sum leads to your heartbeat\" 💖";
            }, 2500);
            const rect = displayElement.getBoundingClientRect();
            for (let i = 0; i < 6; i++) {
              setTimeout(() => createHeart(rect.left + rect.width/2 + (Math.random()-0.5)*60, rect.bottom - 5), i * 100);
            }
          }
          else {
            displayElement.classList.remove('seven-glow');
            // Random romantic messages occasionally
            const loveMessages = [
              "💗 Love is infinite decimals",
              "🌸 She dances in every number",
              "💖 Forever counting memories",
              "✨ Digits of destiny align",
              "❤️ Aditya + Kashish = ∞"
            ];
            if (Math.random() > 0.8) {
              footerElement.innerHTML = loveMessages[Math.floor(Math.random() * loveMessages.length)];
              setTimeout(() => {
                if (!footerElement.innerHTML.includes("LOVE") && !footerElement.innerHTML.includes("7 — She")) {
                  footerElement.innerHTML = "💖 \"Every sum leads to your heartbeat\" 💖";
                }
              }, 2000);
            }
          }
        } catch (error) {
          displayElement.value = "Error";
          footerElement.innerHTML = "💔 Infinite loop of love... try again 💔";
          setTimeout(() => {
            if (displayElement.value === "Error") {
              footerElement.innerHTML = "💖 \"Some calculations never end...\" 💖";
            }
          }, 1500);
        }
      }
      
      // Return public API
      return {
        append: append,
        clear: clearDisplay,
        calculate: calculate
      };
    })();
    
    // Keyboard support
    document.addEventListener('keydown', function(e) {
      const key = e.key;
      if ((key >= '0' && key <= '9') || key === '.' || key === '+' || key === '-' || key === '*' || key === '/') {
        e.preventDefault();
        if (key === '*') calculator.append('*');
        else if (key === '/') calculator.append('/');
        else calculator.append(key);
      } else if (key === 'Enter' || key === '=') {
        e.preventDefault();
        calculator.calculate();
      } else if (key === 'Escape' || key === 'c' || key === 'C') {
        e.preventDefault();
        calculator.clear();
      } else if (key === 'Backspace') {
        e.preventDefault();
        let display = document.getElementById("display");
        display.value = display.value.slice(0, -1);
      }
    });
    
    // Button ripple effect for better tactile feedback
    const allButtons = document.querySelectorAll('.btn');
    allButtons.forEach(btn => {
      btn.addEventListener('click', function(e) {
        const ripple = document.createElement('span');
        ripple.style.position = 'absolute';
        ripple.style.width = '30px';
        ripple.style.height = '30px';
        ripple.style.background = 'radial-gradient(circle, rgba(255,200,220,0.7), transparent)';
        ripple.style.borderRadius = '50%';
        ripple.style.pointerEvents = 'none';
        ripple.style.transform = 'translate(-50%, -50%) scale(0)';
        ripple.style.transition = 'transform 0.3s ease-out, opacity 0.4s';
        ripple.style.left = e.clientX - btn.getBoundingClientRect().left + 'px';
        ripple.style.top = e.clientY - btn.getBoundingClientRect().top + 'px';
        ripple.style.opacity = '0.8';
        btn.style.position = 'relative';
        btn.style.overflow = 'hidden';
        btn.appendChild(ripple);
        
        requestAnimationFrame(() => {
          ripple.style.transform = 'translate(-50%, -50%) scale(8)';
          ripple.style.opacity = '0';
        });
        
        setTimeout(() => ripple.remove(), 400);
      });
    });
    
    // Add subtle floating background particles
    setInterval(() => {
      const particle = document.createElement('div');
      particle.style.position = 'fixed';
      particle.style.width = '2px';
      particle.style.height = '2px';
      particle.style.background = `rgba(255, 100, 150, ${Math.random() * 0.4 + 0.1})`;
      particle.style.borderRadius = '50%';
      particle.style.left = Math.random() * window.innerWidth + 'px';
      particle.style.top = Math.random() * window.innerHeight + 'px';
      particle.style.pointerEvents = 'none';
      particle.style.opacity = '0.5';
      particle.style.zIndex = '0';
      document.body.appendChild(particle);
      setTimeout(() => particle.remove(), 4000);
    }, 1000);

 
  </script>
